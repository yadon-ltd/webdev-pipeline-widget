<svg width="100%" viewBox="0 0 680 960" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f0; --p: #1a1a18; --s: #73726c; --t: #9c9a92; --b: rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1a1a18; --bg2: #2c2c2a; --p: #e8e6de; --s: #9c9a92; --t: #73726c; --b: rgba(255,255,255,0.15); }
    .c-blue rect { fill: #042C53; stroke: #85B7EB; } .c-blue .th, .c-blue .ts { fill: #B5D4F4; }
    .c-gray rect { fill: #2C2C2A; stroke: #B4B2A9; } .c-gray .th { fill: #D3D1C7; } .c-gray .ts { fill: #B4B2A9; }
    .c-teal rect { fill: #04342C; stroke: #5DCAA5; } .c-teal .th, .c-teal .ts { fill: #9FE1CB; }
    .c-coral rect { fill: #4A1B0C; stroke: #F0997B; } .c-coral .th, .c-coral .ts { fill: #F5C4B3; }
    .c-purple rect { fill: #26215C; stroke: #AFA9EC; } .c-purple .th, .c-purple .ts { fill: #CECBF6; }
  }
  @media (prefers-color-scheme: light) {
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue .th { fill: #0C447C; } .c-blue .ts { fill: #185FA5; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray .th { fill: #444441; } .c-gray .ts { fill: #5F5E5A; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; } .c-coral .th { fill: #712B13; } .c-coral .ts { fill: #993C1D; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
  }
  .th { font: 500 14px system-ui, -apple-system, sans-serif; }
  .ts { font: 400 12px system-ui, -apple-system, sans-serif; }
  .arr { stroke: var(--t); stroke-width: 1.5; }
  .leader { stroke: var(--t); stroke-width: 0.5; stroke-dasharray: 4 3; }
  .box rect { fill: var(--bg2); stroke: var(--b); }
  .danger-row { fill: #FCEBEB; } .success-row { fill: #EAF3DE; }
  @media (prefers-color-scheme: dark) { .danger-row { fill: #501313; } .success-row { fill: #173404; } }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- INPUT -->
<g class="c-blue">
  <rect x="200" y="20" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Claude zip (masked credentials)</text>
</g>
<line x1="340" y1="64" x2="340" y2="92" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 1 -->
<g class="c-gray">
  <rect x="200" y="96" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central">1. Extract zip to staging</text>
</g>
<line x1="340" y1="140" x2="340" y2="168" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 2 -->
<g class="c-gray">
  <rect x="160" y="172" width="360" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="192" text-anchor="middle" dominant-baseline="central">2. Distribute (unflatten to tree)</text>
  <text class="ts" x="340" y="212" text-anchor="middle" dominant-baseline="central">Capture real values first, then overwrite</text>
</g>
<line x1="340" y1="228" x2="340" y2="256" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 3 — env patch -->
<g class="c-teal">
  <rect x="160" y="260" width="360" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="280" text-anchor="middle" dominant-baseline="central">3. Env patch</text>
  <text class="ts" x="340" y="300" text-anchor="middle" dominant-baseline="central">Copy masked → .masked, then patch real values</text>
</g>

<!-- deploy.conf feeding into stage 3 -->
<g class="c-teal">
  <rect x="40" y="236" width="100" height="56" rx="6" stroke-width="0.5"/>
  <text class="ts" x="90" y="258" text-anchor="middle" dominant-baseline="central" style="font-family:'SF Mono','Fira Code',monospace">deploy</text>
  <text class="ts" x="90" y="274" text-anchor="middle" dominant-baseline="central" style="font-family:'SF Mono','Fira Code',monospace">.conf</text>
</g>
<line x1="140" y1="264" x2="158" y2="275" class="arr" marker-end="url(#arrow)"/>

<line x1="340" y1="316" x2="340" y2="344" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 4 -->
<g class="c-gray">
  <rect x="160" y="348" width="360" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="368" text-anchor="middle" dominant-baseline="central">4. Push (wd-websync to server)</text>
  <text class="ts" x="340" y="388" text-anchor="middle" dominant-baseline="central">Changed files only, not a mirror</text>
</g>
<line x1="340" y1="404" x2="340" y2="432" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 5 — git sync -->
<g class="c-coral">
  <rect x="160" y="436" width="360" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="456" text-anchor="middle" dominant-baseline="central">5. Git sync (wd-gitsync)</text>
  <text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central">Credential safety gate, then commit + push</text>
</g>

<!-- deploy.conf also feeds gitsync -->
<path d="M90 292 L90 460 L158 460" fill="none" class="arr" marker-end="url(#arrow)"/>

<line x1="340" y1="492" x2="340" y2="520" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 6 — snapshot -->
<g class="c-gray">
  <rect x="160" y="524" width="360" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="544" text-anchor="middle" dominant-baseline="central">6. Snapshot</text>
  <text class="ts" x="340" y="564" text-anchor="middle" dominant-baseline="central">Backup zip + for-claude/ flat files</text>
</g>
<line x1="340" y1="580" x2="340" y2="608" class="arr" marker-end="url(#arrow)"/>

<!-- STAGE 7 -->
<g class="c-gray">
  <rect x="200" y="612" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="634" text-anchor="middle" dominant-baseline="central">7. Cleanup (delete source zip)</text>
</g>

<!-- Separator -->
<line x1="60" y1="688" x2="620" y2="688" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="712" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">Four outputs</text>

<!-- OUTPUT BOXES -->
<g class="c-teal">
  <rect x="40" y="734" width="136" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="108" y="753" text-anchor="middle" dominant-baseline="central">Local repo</text>
  <text class="ts" x="108" y="773" text-anchor="middle" dominant-baseline="central">Real values</text>
</g>

<g class="c-teal">
  <rect x="194" y="734" width="136" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="262" y="753" text-anchor="middle" dominant-baseline="central">Web server</text>
  <text class="ts" x="262" y="773" text-anchor="middle" dominant-baseline="central">Real values</text>
</g>

<g class="c-coral">
  <rect x="348" y="734" width="136" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="416" y="753" text-anchor="middle" dominant-baseline="central">GitHub</text>
  <text class="ts" x="416" y="773" text-anchor="middle" dominant-baseline="central">.example only</text>
</g>

<g class="c-purple">
  <rect x="502" y="734" width="136" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="570" y="753" text-anchor="middle" dominant-baseline="central">Snapshot</text>
  <text class="ts" x="570" y="773" text-anchor="middle" dominant-baseline="central">Zip + for-claude</text>
</g>

<!-- FILE HANDLING MATRIX -->
<line x1="60" y1="818" x2="620" y2="818" stroke="var(--t)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="842" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">File handling per output</text>

<!-- Matrix header -->
<text class="ts" x="60" y="870" dominant-baseline="central" style="font-weight:500;fill:var(--p)">File</text>
<text class="ts" x="228" y="870" text-anchor="middle" dominant-baseline="central" style="font-weight:500;fill:var(--p)">Local</text>
<text class="ts" x="340" y="870" text-anchor="middle" dominant-baseline="central" style="font-weight:500;fill:var(--p)">Server</text>
<text class="ts" x="452" y="870" text-anchor="middle" dominant-baseline="central" style="font-weight:500;fill:var(--p)">GitHub</text>
<text class="ts" x="576" y="870" text-anchor="middle" dominant-baseline="central" style="font-weight:500;fill:var(--p)">Claude</text>

<!-- Row 1: secret files -->
<rect class="danger-row" x="40" y="882" width="600" height="24" rx="4" opacity="0.3"/>
<text class="ts" x="60" y="898" dominant-baseline="central" style="font-family:'SF Mono','Fira Code',monospace;fill:var(--s)">secret files</text>
<text class="ts" x="228" y="898" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">real</text>
<text class="ts" x="340" y="898" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">real</text>
<text class="ts" x="452" y="898" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">.gitignore</text>
<text class="ts" x="576" y="898" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">excluded</text>

<!-- Row 2: .masked files -->
<rect class="success-row" x="40" y="910" width="600" height="24" rx="4" opacity="0.2"/>
<text class="ts" x="60" y="926" dominant-baseline="central" style="font-family:'SF Mono','Fira Code',monospace;fill:var(--s)">.masked files</text>
<text class="ts" x="228" y="926" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">masked</text>
<text class="ts" x="340" y="926" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">synced</text>
<text class="ts" x="452" y="926" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">.gitignore</text>
<text class="ts" x="576" y="926" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">collected</text>

<!-- Row 3: everything else -->
<text class="ts" x="60" y="950" dominant-baseline="central" style="fill:var(--s)">everything else</text>
<text class="ts" x="228" y="950" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">as-is</text>
<text class="ts" x="340" y="950" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">synced</text>
<text class="ts" x="452" y="950" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">tracked</text>
<text class="ts" x="576" y="950" text-anchor="middle" dominant-baseline="central" style="fill:var(--s)">collected</text>

</svg>
